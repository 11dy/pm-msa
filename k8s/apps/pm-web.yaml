apiVersion: apps/v1
kind: Deployment
metadata:
  name: pm-web
  namespace: pm-msa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pm-web
  template:
    metadata:
      labels:
        app: pm-web
    spec:
      containers:
      - name: pm-web
        image: pm-web:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: pm-config
              key: NEXT_PUBLIC_API_BASE_URL
---
apiVersion: v1
kind: Service
metadata:
  name: pm-web
  namespace: pm-msa
spec:
  type: LoadBalancer
  selector:
    app: pm-web
  ports:
  - port: 3000
    targetPort: 3000
