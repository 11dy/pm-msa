apiVersion: apps/v1
kind: Deployment
metadata:
  name: pm-resource
  namespace: pm-msa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pm-resource
  template:
    metadata:
      labels:
        app: pm-resource
    spec:
      containers:
      - name: pm-resource
        image: pm-resource:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8085
        env:
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: pm-secret
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pm-secret
              key: DB_PASSWORD
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: pm-config
              key: SPRING_DATASOURCE_URL_DY
        - name: SPRING_JPA_HIBERNATE_DDL_AUTO
          value: "update"
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          valueFrom:
            configMapKeyRef:
              name: pm-config
              key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        - name: LOG_DIR
          value: /logs
        volumeMounts:
        - name: logs
          mountPath: /logs
      volumes:
      - name: logs
        hostPath:
          path: /Users/idong-yeol/dev/pm-logs/pm-resource
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: pm-resource
  namespace: pm-msa
spec:
  selector:
    app: pm-resource
  ports:
  - port: 8085
    targetPort: 8085
