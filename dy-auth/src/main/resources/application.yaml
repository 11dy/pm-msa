server:
  port: 8081

spring:
  application:
    name: dy-auth
  datasource:
    url: jdbc:mysql://localhost:3306/dy_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:east4317}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:dy-msa-secret-key-for-jwt-token-generation-and-validation-minimum-256-bits}
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000
  issuer: dy-auth

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.dy.dyauth: DEBUG
    org.springframework.security: DEBUG
