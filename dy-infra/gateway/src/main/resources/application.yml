server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        discovery:
          locator:
            enabled: true
            lower-case-service-id: true
        routes:
          - id: dy-auth
            uri: lb://DY-AUTH
            predicates:
              - Path=/api/auth/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:dy-msa-secret-key-for-jwt-token-generation-and-validation-minimum-256-bits}
