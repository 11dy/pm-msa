server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        discovery:
          locator:
            enabled: true
            lower-case-service-id: true
        routes:
          # 예시: user-service 라우팅
          # - id: user-service
          #   uri: lb://USER-SERVICE
          #   predicates:
          #     - Path=/api/users/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
