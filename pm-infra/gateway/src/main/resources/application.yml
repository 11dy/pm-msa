server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: pm-auth
              uri: lb://PM-AUTH
              predicates:
                - Path=/api/auth/**
            - id: pm-auth-oauth2
              uri: lb://PM-AUTH
              predicates:
                - Path=/oauth2/**
            - id: pm-auth-login-oauth2
              uri: lb://PM-AUTH
              predicates:
                - Path=/login/oauth2/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET}
