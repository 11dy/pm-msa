server:
  port: 8080
  codec:
    max-in-memory-size: 10MB

spring:
  application:
    name: gateway
  codec:
    max-in-memory-size: 10MB
  cloud:
    gateway:
      httpclient:
        response-timeout: 60s
      server:
        webflux:
          routes:
            - id: pm-auth
              uri: lb://PM-AUTH
              predicates:
                - Path=/api/auth/**
            - id: pm-auth-oauth2
              uri: lb://PM-AUTH
              predicates:
                - Path=/oauth2/**
            - id: pm-auth-login-oauth2
              uri: lb://PM-AUTH
              predicates:
                - Path=/login/oauth2/**
            # pm-workflow
            - id: pm-workflow-agents
              uri: lb://PM-WORKFLOW
              predicates:
                - Path=/api/agents/**
            - id: pm-workflow-conversations
              uri: lb://PM-WORKFLOW
              predicates:
                - Path=/api/conversations/**
            - id: pm-workflow-workflows
              uri: lb://PM-WORKFLOW
              predicates:
                - Path=/api/workflows/**
            # pm-document (업로드는 pm-document로 라우팅)
            - id: pm-document-upload
              uri: lb://PM-DOCUMENT
              predicates:
                - Path=/api/documents/upload
                - Method=POST
            - id: pm-workflow-documents
              uri: lb://PM-WORKFLOW
              predicates:
                - Path=/api/documents/**
            - id: pm-workflow-websocket
              uri: lb:ws://PM-WORKFLOW
              predicates:
                - Path=/ws/**
            - id: pm-workflow-health
              uri: lb://PM-WORKFLOW
              predicates:
                - Path=/api/workflow-health/**
            # health (서비스별 헬스체크 — Gateway 경유)
            - id: pm-agent-health
              uri: lb://PM-AGENT
              predicates:
                - Path=/api/health/agent
              filters:
                - SetPath=/health
            - id: pm-document-health
              uri: lb://PM-DOCUMENT
              predicates:
                - Path=/api/health/document
              filters:
                - SetPath=/health
            - id: pm-auth-health
              uri: lb://PM-AUTH
              predicates:
                - Path=/api/health/auth
              filters:
                - SetPath=/health
            - id: pm-workflow-health
              uri: lb://PM-WORKFLOW
              predicates:
                - Path=/api/health/workflow
              filters:
                - SetPath=/health
            # pm-agent
            - id: pm-agent-chat
              uri: lb://PM-AGENT
              predicates:
                - Path=/agent/chat/**
            - id: pm-agent-pii
              uri: lb://PM-AGENT
              predicates:
                - Path=/agent/pii/**
            # pm-workflow (project)
            - id: pm-workflow-project
              uri: lb://PM-WORKFLOW
              predicates:
                - Path=/api/project/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET}
